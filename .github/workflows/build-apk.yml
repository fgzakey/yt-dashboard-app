name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write # needed to create/update releases

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # The repo ships only pubspec.yaml + lib/. Generate the android/
      # platform folder here so no Gradle boilerplate lives in git.
      - name: Generate platform scaffolding
        run: flutter create --platforms=android --org com.fidelkey --project-name yt_dashboard_app .

      # Flutter's release manifest has no INTERNET permission by default —
      # without this the release APK cannot reach the server at all.
      - name: Patch AndroidManifest (internet permission + app label)
        run: |
          M=android/app/src/main/AndroidManifest.xml
          grep -q 'android.permission.INTERNET' "$M" || \
            sed -i 's#<application#<uses-permission android:name="android.permission.INTERNET"/>\n    <application#' "$M"
          sed -i 's#android:label="yt_dashboard_app"#android:label="YT Dashboard"#' "$M"

      # Version = pubspec version name + CI run number as the build number,
      # so every push produces a distinct, traceable APK.
      - name: Compute version
        id: ver
        run: |
          NAME=$(grep '^version:' pubspec.yaml | awk '{print $2}' | cut -d'+' -f1)
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "full=v$NAME-b${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      - name: Build release APK
        run: |
          flutter pub get
          flutter build apk --release \
            --build-name=${{ steps.ver.outputs.name }} \
            --build-number=${{ github.run_number }}
          cp build/app/outputs/flutter-apk/app-release.apk \
             "yt-dashboard-app-${{ steps.ver.outputs.full }}.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: yt-dashboard-app-${{ steps.ver.outputs.full }}
          path: yt-dashboard-app-${{ steps.ver.outputs.full }}.apk

      # Permanent, versioned release — one per push, keeps full history.
      - name: Versioned release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.full }}
          name: yt-dashboard-app ${{ steps.ver.outputs.full }}
          files: yt-dashboard-app-${{ steps.ver.outputs.full }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Rolling "latest" release — always the newest APK at a stable URL.
      - name: Update latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest APK
          files: yt-dashboard-app-${{ steps.ver.outputs.full }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
